{% extends 'base.html' %}
{% block content %}

<div class="card p-4 shadow col-md-5 mx-auto text-center">

    <!-- Error / Warning Messages Displaying Area -->
    {% if messages %}
        <div class="mb-3">
            {% for message in messages %}
                <div class="alert alert-danger alert-dismissible fade show text-start" role="alert">
                    {{ message }}
                    <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
                </div>
            {% endfor %}
        </div>
    {% endif %}

    <h5>Delete customer?</h5>
    <p class="fw-bold text-danger">{{ customer.name }}</p>

    <form method="post">
        {% csrf_token %}
        <button class="btn btn-danger">Yes Delete</button>
        <a href="{% url 'customers_list' %}" class="btn btn-secondary">Cancel</a>
    </form>

</div>

{% endplaylist %} {% comment %} (Base block ends here) {% endcomment %}
{% endblock %}
