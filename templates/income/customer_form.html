{% extends 'base.html' %}
{% block content %}

<div class="container mt-4">

    <!-- Back Button -->
    <div class="mb-3">
        <button onclick="history.back()" class="btn btn-secondary btn-sm">
            ← Back
        </button>
    </div>

    <div class="card p-4 shadow-sm mx-auto" style="max-width:600px">

        <h4 class="mb-4 text-center">
            {% if customer %}✏️ Edit Customer{% else %}➕ Add Customer{% endif %}
        </h4>

        <form method="post">
            {% csrf_token %}

            <div class="mb-3">
                <label class="form-label">Name</label>
                <input type="text"
                       name="name"
                       class="form-control"
                       value="{{ customer.name|default:'' }}"
                       required>
            </div>

            <div class="mb-3">
                <label class="form-label">Phone</label>
                <input type="text"
                       name="phone"
                       class="form-control"
                       value="{{ customer.phone|default:'' }}">
            </div>

            <div class="mb-3">
                <label class="form-label">Address</label>
                <textarea name="address"
                          class="form-control"
                          rows="3">{{ customer.address|default:'' }}</textarea>
            </div>

            <div class="d-grid gap-2 d-md-flex justify-content-md-center mt-3">

                <button class="btn btn-primary">
                    Save
                </button>

                <a href="{% url 'customer_list' %}" class="btn btn-secondary">
                    Back
                </a>

            </div>

        </form>

    </div>

</div>

{% endblock %}
