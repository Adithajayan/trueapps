{% extends 'base.html' %}
{% block content %}

<div class="container mt-4">

    <!-- Back Button -->
    <div class="mb-3">
        <button onclick="history.back()" class="btn btn-secondary btn-sm">
            ← Back
        </button>
    </div>

    <div class="card p-4 shadow-sm mx-auto" style="max-width:500px;">

        <h4 class="mb-4 text-center">Edit Work</h4>

        <form method="post">
        {% csrf_token %}

        <div class="mb-3">
            <label class="form-label">Work Title</label>
            <input type="text"
                   name="title"
                   class="form-control"
                   value="{{ work.title }}"
                   required>
        </div>

        <div class="mb-3">
            <label class="form-label">Total Amount</label>
            <input type="number"
                   name="total_amount"
                   class="form-control"
                   value="{{ work.total_amount }}"
                   required>
        </div>

        <div class="mb-3">
            <label class="form-label">Date</label>
            <input type="date"
                   name="work_date"
                   class="form-control"
                   value="{{ work.work_date|date:'Y-m-d' }}"
                   required>
        </div>

        <div class="d-grid gap-2 d-md-flex justify-content-md-center mt-3">

            <button class="btn btn-primary">
                Update
            </button>

            <a href="{% url 'work_list' work.customer.id %}"
               class="btn btn-secondary">
                Cancel
            </a>

        </div>

        </form>

    </div>

</div>

{% endblock %}
