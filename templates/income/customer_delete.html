{% extends 'base.html' %}
{% block content %}

<div class="container mt-4">

    <!-- Back Button -->
    <div class="mb-3">
        <a href="{% url 'customer_list' %}" class="btn btn-secondary btn-sm">
            ← Back
        </a>
    </div>

    <div class="card p-4 shadow-sm text-center mx-auto" style="max-width:500px">

        <h5 class="text-danger mb-3">
            Are you sure?
        </h5>

        <p class="mb-4">
            Delete customer <strong>{{ customer.name }}</strong> ?
        </p>

        <form method="post">
            {% csrf_token %}

            <div class="d-grid gap-2 d-md-flex justify-content-md-center">
                <button class="btn btn-danger">
                    Yes Delete
                </button>

                <a href="{% url 'customer_list' %}" class="btn btn-secondary">
                    Cancel
                </a>
            </div>

        </form>

    </div>

</div>

{% endblock %}
