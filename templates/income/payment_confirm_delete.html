{% extends 'base.html' %}
{% block content %}

<style>

.delete-card{
max-width:500px;
margin:60px auto;
background:#fff;
border-radius:14px;
padding:30px;
box-shadow:0 12px 30px rgba(0,0,0,.1);
text-align:center;
}

.delete-icon{
font-size:48px;
color:#dc3545;
margin-bottom:15px;
}

/* mobile fix */

@media(max-width:576px){

.delete-card{
margin:30px 15px;
padding:22px;
}

.delete-icon{
font-size:38px;
}

}

</style>

<div class="container">

<!-- back button -->

<div class="mb-3">
<button onclick="history.back()" class="btn btn-secondary btn-sm">
← Back
</button>
</div>

<div class="delete-card">

<div class="delete-icon">⚠️</div>

<h4 class="mb-3">
Delete Payment?
</h4>

<p class="text-muted">
This payment will be permanently deleted.
</p>

<hr>

<p><b>Date:</b> {{ payment.date }}</p>

<p><b>Amount:</b> ₹ {{ payment.amount }}</p>

<p><b>Mode:</b> {{ payment.mode }}</p>

<form method="post" class="mt-4">

{% csrf_token %}

<div class="d-grid gap-2 d-sm-flex justify-content-sm-center">

<button type="submit" class="btn btn-danger px-4">
Yes, Delete
</button>

<a href="{% url 'payment_list' payment.work.id %}"
class="btn btn-secondary px-4">
Cancel
</a>

</div>

</form>

</div>

</div>

{% endblock %}
