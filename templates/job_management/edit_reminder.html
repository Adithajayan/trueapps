{% extends "base.html" %}
{% block content %}

<div class="container mt-4">

<!-- Back Button -->
<div class="mb-3">
<a href="{% url 'reminders' %}" class="btn btn-secondary btn-sm">
← Back
</a>
</div>

<div class="row justify-content-center">
<div class="col-12 col-md-8 col-lg-6">

<div class="card shadow border-0 edit-reminder-card">
<div class="card-body">

<h4 class="fw-bold mb-3">✏ Edit Reminder</h4>

<form method="POST">
{% csrf_token %}

<input type="text" name="title"
value="{{ r.title }}"
class="form-control mb-3">

<select name="reminder_type" class="form-control mb-3">
<option value="CALL">Call</option>
<option value="PAYMENT">Payment</option>
<option value="VISIT">Visit</option>
<option value="OTHER">Other</option>
</select>

<input type="date"
name="reminder_date"
value="{{ r.reminder_date|date:'Y-m-d' }}"
class="form-control mb-3">

<textarea name="notes"
class="form-control mb-3">{{ r.notes }}</textarea>

<button class="btn btn-primary w-100">
Update Reminder
</button>

</form>

</div>
</div>

</div>
</div>

</div>

<style>

.edit-reminder-card{
border-radius:18px;
}

.form-control{
border-radius:10px;
}

.btn{
border-radius:10px;
font-weight:600;
}

/* Mobile improvement */
@media (max-width:576px){

.card-body{
padding:22px;
}

h4{
font-size:20px;
}

}

</style>

{% endblock %}
