{% extends 'base.html' %}

{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-6 col-lg-5">
            <div class="card shadow-lg border-0 rounded-4">
                <div class="card-body p-4 p-md-5 text-center">
                    
                    <div class="mb-4">
                        <div class="display-1 text-danger">
                            <i class="bi bi-trash3-fill"></i>
                        </div>
                    </div>

                    <h2 class="fw-bold text-dark mb-3">Delete Enquiry?</h2>
                    <p class="text-muted mb-4">
                        Are you sure you want to delete the enquiry for 
                        <span class="fw-bold text-dark">{{ job.name }}</span>? 
                        <br><small class="text-muted">Location: {{ job.place }}</small>
                    </p>

                    <form method="POST" class="d-grid gap-2">
                        {% csrf_token %}
                        <button type="submit" class="btn btn-danger btn-lg rounded-pill shadow-sm py-3 fw-bold">
                            Permanently Delete
                        </button>
                        <a href="{% url 'enquiry_list' %}" class="btn btn-light btn-lg rounded-pill py-3 fw-semibold mt-2">
                            Cancel
                        </a>
                    </form>

                </div>
            </div>
        </div>
    </div>
</div>

<style>
    .rounded-4 { border-radius: 1.5rem !important; }
    .btn { transition: all 0.2s ease-in-out; }
    .btn:hover { transform: translateY(-2px); }
</style>
{% endblock %}
