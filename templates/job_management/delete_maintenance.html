{% extends 'base.html' %}

{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-6 col-lg-5">
            <div class="card shadow-lg border-0 rounded-4">
                <div class="card-body p-4 p-md-5 text-center">
                    
                    <div class="mb-4">
                        <div class="display-1 text-danger">
                            <i class="bi bi-exclamation-triangle-fill"></i>
                        </div>
                    </div>

                    <h2 class="fw-bold text-dark mb-3">Confirm Delete</h2>
                    <p class="text-muted mb-4">
                        Are you sure you want to delete the maintenance record for 
                        <span class="fw-bold text-dark">{{ job.name }}</span> at 
                        <span class="fw-bold text-dark">{{ job.place }}</span>? 
                        <br><small class="text-danger">This action cannot be undone.</small>
                    </p>

                    <form method="POST" class="d-grid gap-2">
                        {% csrf_token %}
                        <button type="submit" class="btn btn-danger btn-lg rounded-pill shadow-sm py-3 fw-bold">
                            Yes, Delete Record
                        </button>
                        <a href="{% url 'maintenance_list' %}" class="btn btn-light btn-lg rounded-pill py-3 fw-semibold mt-2">
                            No, Keep it
                        </a>
                    </form>

                </div>
            </div>
            
            <div class="text-center mt-4">
                <a href="{% url 'maintenance_list' %}" class="text-decoration-none text-muted small">
                    <i class="bi bi-arrow-left me-1"></i> Back to Maintenance List
                </a>
            </div>
        </div>
    </div>
</div>

<style>
    .card {
        transition: transform 0.3s ease;
    }
    .btn {
        transition: all 0.2s ease-in-out;
    }
    .btn:hover {
        transform: translateY(-2px);
    }
    .rounded-4 {
        border-radius: 1.5rem !important;
    }
</style>
{% endblock %}
