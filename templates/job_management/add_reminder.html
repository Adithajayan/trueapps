{% extends "base.html" %}
{% block content %}

<div class="container-fluid mt-4">

<!-- Back Button -->
<div class="mb-3">
<a href="{% url 'job_dashboard' %}" class="btn btn-secondary btn-sm">
← Back
</a>
</div>

<div class="row justify-content-center">
<div class="col-12 col-md-10 col-lg-8 col-xl-5">

<div class="card shadow-lg border-0 reminder-form">

<div class="card-body p-4">

<h4 class="fw-bold mb-4 text-center">
🔔 Create Reminder
</h4>

<form method="POST">
{% csrf_token %}

<label class="form-label">Title</label>
<input type="text" name="title"
class="form-control mb-3"
placeholder="Supplier call / Payment followup"
required>

<label class="form-label">Reminder Type</label>
<select name="reminder_type" class="form-select mb-3">
<option value="CALL">📞 Call</option>
<option value="PAYMENT">💰 Payment</option>
<option value="VISIT">📍 Visit</option>
<option value="OTHER">📝 Other</option>
</select>

<label class="form-label">Reminder Date</label>
<input type="date" name="reminder_date"
class="form-control mb-3" required>

<label class="form-label">Notes</label>
<textarea name="notes"
class="form-control mb-4"
rows="3"></textarea>

<button class="btn btn-danger w-100">
Save Reminder
</button>

</form>

</div>
</div>

</div>
</div>

</div>

<style>

.reminder-form{
border-radius:18px;
animation:fadeIn .4s ease;
}

@keyframes fadeIn{
from{opacity:0;transform:translateY(10px);}
to{opacity:1;}
}

/* Mobile improvement */
@media (max-width:576px){

.card-body{
padding:22px;
}

h4{
font-size:20px;
}

}

</style>

{% endblock %}
