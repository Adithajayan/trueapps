{% extends "base.html" %}
{% block content %}

<div class="container mt-4">

<!-- Back Button -->
<div class="mb-3">
<a href="{% url 'enquiry_list' %}" class="btn btn-secondary btn-sm">
← Back
</a>
</div>

<div class="row justify-content-center">
<div class="col-12 col-md-8 col-lg-6">

<div class="card shadow border-0 enquiry-edit-card">
<div class="card-body">

<h4 class="fw-bold mb-4">✏ Edit Enquiry</h4>

<form method="POST">
{% csrf_token %}

<div class="mb-3">
<label>Name</label>
<input type="text" name="name"
value="{{ job.name }}"
class="form-control">
</div>

<div class="mb-3">
<label>Place</label>
<input type="text" name="place"
value="{{ job.place }}"
class="form-control">
</div>

<div class="mb-3">
<label>Date</label>
<input type="date" name="date"
value="{{ job.date|date:'Y-m-d' }}"
class="form-control">
</div>

<button class="btn btn-success w-100">
✅ Update Work
</button>

</form>

</div>
</div>

</div>
</div>

</div>

<style>

.enquiry-edit-card{
border-radius:18px;
}

.form-control{
border-radius:10px;
}

.btn{
border-radius:10px;
font-weight:600;
}

/* Mobile improvement */
@media (max-width:576px){

.card-body{
padding:22px;
}

h4{
font-size:20px;
}

}

</style>

{% endblock %}
