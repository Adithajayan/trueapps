{% extends "base.html" %}
{% block content %}

<div class="container mt-4">

<!-- Back Button -->
<div class="mb-3">
<a href="{% url 'job_dashboard' %}" class="btn btn-secondary btn-sm">
    ← Back
</a>
</div>

<div class="row justify-content-center">
<div class="col-12 col-md-10 col-lg-7">

<div class="card shadow-lg border-0">

<div class="card-header bg-warning text-dark">
    <h4 class="mb-0">🛠 Add Maintenance Work</h4>
</div>

<div class="card-body">

<form method="POST">
{% csrf_token %}

<!-- Customer Name -->
<div class="mb-3">
<label class="form-label fw-semibold">Customer Name</label>
<input type="text" name="name" class="form-control" required>
</div>

<!-- Place -->
<div class="mb-3">
<label class="form-label fw-semibold">Place</label>
<input type="text" name="place" class="form-control" required>
</div>

<!-- Date -->
<div class="mb-3">
<label class="form-label fw-semibold">Maintenance Date</label>
<input type="date" name="date" class="form-control" required>
</div>

<!-- Details -->
<div class="mb-3">
<label class="form-label fw-semibold">Maintenance Details</label>
<textarea name="details"
          rows="4"
          class="form-control"
          placeholder="Work description..."></textarea>
</div>

<div class="d-flex flex-column flex-sm-row gap-2">

<button type="submit" class="btn btn-warning w-100">
    💾 Save Maintenance
</button>

<a href="{% url 'maintenance_list' %}"
   class="btn btn-outline-dark w-100">
    Cancel
</a>

</div>

</form>

</div>
</div>

</div>
</div>
</div>

<style>

.card{
border-radius:18px;
}

.form-control{
border-radius:10px;
}

.btn{
border-radius:10px;
font-weight:600;
}

/* Mobile spacing improvement */
@media (max-width:576px){

.card-body{
padding:20px;
}

h4{
font-size:20px;
}

}

</style>

{% endblock %}
