{% extends "base.html" %}
{% block content %}

<div class="container mt-5">

<!-- Back Button -->
<div class="mb-3">
<a href="{% url 'service_list' %}" class="btn btn-secondary btn-sm">
← Back
</a>
</div>

<div class="row justify-content-center">
<div class="col-12 col-md-8 col-lg-6">

<div class="card shadow border-0 p-5 text-center delete-service-card">

<h4 class="fw-bold text-danger mb-3">
⚠ Delete Service ?
</h4>

<p class="text-muted">
Are you sure you want to delete
<b>{{ service.name }}</b> service record?
</p>

<form method="POST">
{% csrf_token %}

<div class="d-flex flex-column flex-sm-row justify-content-center gap-2 mt-3">

<button class="btn btn-danger px-4 w-100">
Yes Delete
</button>

<a href="{% url 'service_list' %}"
   class="btn btn-secondary px-4 w-100">
Cancel
</a>

</div>

</form>

</div>

</div>
</div>

</div>

<style>

.delete-service-card{
border-radius:18px;
}

/* Buttons */
.btn{
border-radius:10px;
font-weight:600;
}

/* Mobile improvement */
@media (max-width:576px){

.delete-service-card{
padding:25px;
}

h4{
font-size:20px;
}

}

</style>

{% endblock %}
