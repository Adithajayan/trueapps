{% extends 'base.html' %}
{% block content %}

<style>
/* ===== BACK BUTTON ===== */
.back-btn{
    display:inline-flex;
    align-items:center;
    gap:6px;
    background:linear-gradient(135deg,#111827,#374151);
    color:white;
    padding:7px 16px;
    border-radius:30px;
    text-decoration:none;
    font-size:14px;
    font-weight:600;
    margin-bottom:15px;
    transition:.3s;
}

.back-btn:hover{
    transform:translateY(-2px);
    box-shadow:0 6px 14px rgba(0,0,0,0.25);
    color:white;
}

/* FORM CARD */
.form-card{
    max-width:520px;
    margin:auto;
    background:#ffffff;
    padding:24px;
    border-radius:16px;
    box-shadow:0 12px 28px rgba(0,0,0,0.08);
}

/* SECTION DIVIDER */
.section-title {
    font-size: 13px;
    text-transform: uppercase;
    color: #6b7280;
    letter-spacing: 1px;
    font-weight: 700;
    margin-top: 20px;
    margin-bottom: 10px;
    border-bottom: 1px solid #e5e7eb;
    padding-bottom: 5px;
}

/* MOBILE */
@media(max-width:768px){
    .form-card{
        padding:18px;
    }
    .form-card h4{
        font-size:18px;
    }
    .btn{
        font-size:13px;
        padding:7px 12px;
    }
}
</style>

<div class="container mt-4">

    <a href="{% url 'staff_list' %}" class="back-btn">
        ← Back
    </a>

    <div class="form-card">

        <h4 class="mb-3">Edit Staff: {{ staff.name }}</h4>

        {% if messages %}
            {% for message in messages %}
                <div class="alert alert-{{ message.tags }} alert-dismissible fade show" role="alert">
                    {{ message }}
                    <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
                </div>
            {% endfor %}
        {% endif %}

        <form method="post">
            {% csrf_token %}

            <div class="section-title">Login Credentials</div>

            <div class="mb-3">
                <label class="form-label">Username</label>
                <input type="text"
                       name="username"
                       class="form-control"
                       value="{{ staff.user.username|default:'' }}"
                       placeholder="Enter username to enable login">
            </div>

            <div class="mb-3">
                <label class="form-label">New Password</label>
                <input type="password"
                       name="password"
                       class="form-control"
                       placeholder="Leave blank to keep current password">
                <small class="text-muted" style="font-size: 11px;">Change only if needed</small>
            </div>

            <div class="section-title">Personal Details</div>

            <div class="mb-3">
                <label class="form-label">Name</label>
                <input type="text"
                       name="name"
                       class="form-control"
                       value="{{ staff.name }}"
                       required>
            </div>

            <div class="mb-3">
                <label class="form-label">Designation</label>
                <input type="text"
                       name="designation"
                       class="form-control"
                       value="{{ staff.designation }}">
            </div>

            <div class="mb-3">
                <label class="form-label">Address</label>
                <textarea name="address"
                          class="form-control"
                          rows="2">{{ staff.address }}</textarea>
            </div>

            <div class="mb-3">
                <label class="form-label">Daily Salary</label>
                <input type="text"
                       name="daily_salary"
                       class="form-control"
                       value="{{ staff.daily_salary }}"
                       required>
            </div>

            <div class="form-check mb-3">
                <input type="checkbox"
                       id="status"
                       name="status"
                       class="form-check-input"
                       {% if staff.status %}checked{% endif %}>
                <label class="form-check-label" for="status">
                    Active
                </label>
            </div>

            <div class="d-flex gap-2 mt-4">
                <button class="btn btn-primary px-4">
                    Update Staff
                </button>
                <a href="{% url 'staff_list' %}"
                   class="btn btn-secondary px-4">
                    Cancel
                </a>
            </div>

        </form>

    </div>

</div>

{% endblock %}
