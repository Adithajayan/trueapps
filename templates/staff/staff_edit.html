{% extends 'base.html' %}
{% block content %}

<style>

/* ===== BACK BUTTON ===== */
.back-btn{
    display:inline-flex;
    align-items:center;
    gap:6px;
    background:linear-gradient(135deg,#111827,#374151);
    color:white;
    padding:7px 16px;
    border-radius:30px;
    text-decoration:none;
    font-size:14px;
    font-weight:600;
    margin-bottom:15px;
    transition:.3s;
}

.back-btn:hover{
    transform:translateY(-2px);
    box-shadow:0 6px 14px rgba(0,0,0,0.25);
    color:white;
}

/* FORM CARD */
.form-card{
    max-width:520px;
    margin:auto;
    background:#ffffff;
    padding:24px;
    border-radius:16px;
    box-shadow:0 12px 28px rgba(0,0,0,0.08);
}

/* MOBILE */
@media(max-width:768px){

    .form-card{
        padding:18px;
    }

    .form-card h4{
        font-size:18px;
    }

    .btn{
        font-size:13px;
        padding:7px 12px;
    }

}

</style>

<div class="container mt-4">

    <!-- BACK BUTTON -->
<!--    <a href="{% url 'staff_list' %}" class="back-btn">-->
<!--        ← Back-->
<!--    </a>-->

<div class="form-card">

<h4 class="mb-3">Edit Staff</h4>

<form method="post">
    {% csrf_token %}

    <div class="mb-3">
        <label class="form-label">Name</label>

        <input type="text"
               name="name"
               class="form-control"
               value="{{ staff.name }}">
    </div>

    <div class="mb-3">
        <label class="form-label">Designation</label>

        <input type="text"
               name="designation"
               class="form-control"
               value="{{ staff.designation }}">
    </div>

    <div class="mb-3">
        <label class="form-label">Address</label>

        <textarea name="address"
                  class="form-control">{{ staff.address }}</textarea>
    </div>

    <div class="mb-3">
        <label class="form-label">Daily Salary</label>

        <input type="text"
               name="daily_salary"
               class="form-control"
               value="{{ staff.daily_salary }}">
    </div>

    <div class="form-check mb-3">

        <input type="checkbox"
               name="status"
               class="form-check-input"
               {% if staff.status %}checked{% endif %}>

        <label class="form-check-label">
            Active
        </label>

    </div>

    <div class="d-flex gap-2">

        <button class="btn btn-primary">
            Update
        </button>

        <a href="{% url 'staff_list' %}"
           class="btn btn-secondary">
            Back
        </a>

    </div>

</form>

</div>

</div>

{% endblock %}
