{% extends 'base.html' %}
{% block content %}

<style>

/* ===== BACK BUTTON ===== */
.back-btn{
    display:inline-flex;
    align-items:center;
    gap:6px;
    background:linear-gradient(135deg,#111827,#374151);
    color:white;
    padding:7px 16px;
    border-radius:30px;
    text-decoration:none;
    font-size:14px;
    font-weight:600;
    margin-bottom:15px;
    transition:.3s;
}

.back-btn:hover{
    transform:translateY(-2px);
    box-shadow:0 6px 14px rgba(0,0,0,0.25);
    color:white;
}

/* TABLE HEADER */
.staff-table th{
    background:#1f2937;
    color:#fff;
}

/* STATUS BADGE */
.status-active{
    background:#22c55e;
    color:#fff;
    padding:3px 10px;
    border-radius:12px;
    font-size:12px;
}

.status-inactive{
    background:#ef4444;
    color:#fff;
    padding:3px 10px;
    border-radius:12px;
    font-size:12px;
}

/* MOBILE */
@media(max-width:768px){

    h4{
        font-size:20px;
    }

    table th,
    table td{
        font-size:13px;
        white-space:nowrap;
    }

    .btn{
        font-size:12px;
        padding:5px 8px;
    }

}

</style>

<div class="container mt-4">

    <!-- BACK BUTTON -->
    <a href="{% url 'dashboard' %}" class="back-btn">
        ← Back
    </a>

    <div class="d-flex justify-content-between align-items-center flex-wrap gap-2">

        <h4>Staff List</h4>

        <a href="/staff/add/" class="btn btn-primary">
            + Add Staff
        </a>

    </div>

<div class="table-responsive mt-3">

<table class="table table-bordered table-striped staff-table">

    <tr>
        <th>Name</th>
        <th>Designation</th>
        <th>Salary</th>
        <th>Status</th>
        <th>Action</th>
    </tr>

    {% for s in staffs %}
    <tr>

        <td>{{ s.name }}</td>

        <td>{{ s.designation }}</td>

        <td>₹ {{ s.daily_salary }}</td>

        <td>

            {% if s.status %}
                <span class="status-active">Active</span>
            {% else %}
                <span class="status-inactive">Inactive</span>
            {% endif %}

        </td>

        <td>

            <a href="{% url 'staff_edit' s.id %}"
               class="btn btn-sm btn-warning">
                Edit
            </a>

            <a href="{% url 'staff_delete' s.id %}"
               class="btn btn-sm btn-danger">
                Delete
            </a>

        </td>

    </tr>

    {% endfor %}

</table>

</div>

</div>

{% endblock %}
