<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0">
    <title>TRUEAPPS Login | Premium Red</title>

    <style>
        /* ================= GLOBAL ================= */
        body {
            margin: 0; padding: 0;
            font-family: 'Poppins', sans-serif;
            background: #050505;
            display: flex; justify-content: center; align-items: center;
            min-height: 100vh; overflow: hidden; color: white;
        }

        /* ================= INTRO (FIXED FOR MOBILE) ================= */
        #intro {
            position: fixed; inset: 0;
            background: #000;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            z-index: 9999; transition: opacity 0.8s ease;
        }

        .title {
            font-size: 70px; letter-spacing: 8px; font-weight: 800;
            white-space: nowrap; /* Text thazhe pokilla */
            display: flex; justify-content: center;
        }

        .dev { margin-top: 12px; font-size: 12px; opacity: .7; }

        .letter {
            opacity: 0; transform: translateY(40px);
            display: inline-block; animation: reveal .6s forwards;
        }

        @keyframes reveal { to { opacity: 1; transform: translateY(0); } }

        /* Mobile Intro Fix - Screenshots-il kanda aa cutting ivide fix aakum */
        @media (max-width: 600px) {
            .title { font-size: 32px; letter-spacing: 4px; }
            .dev { font-size: 10px; }
        }

        /* ================= LOGIN PAGE ================= */
        #loginPage {
            opacity: 0; transition: 2s ease-in-out;
            display: flex; justify-content: center; align-items: center;
            width: 100%; height: 100vh;
        }

        .main-container {
            position: relative; width: 500px; height: 500px;
            display: flex; justify-content: center; align-items: center;
        }

        /* Premium Glow Rings */
        .ring {
            position: absolute; width: 100%; height: 100%;
            border-radius: 50%; border: 2px solid transparent;
            border-top: 3px solid #ff1e1e;
            animation: rotateRing 3s linear infinite;
        }

        .ring:nth-child(1) {
            width: 440px; height: 440px;
            border-bottom: 3px solid #ff1e1e;
            filter: blur(1px) drop-shadow(0 0 15px #ff1e1e);
            animation-duration: 4s;
        }

        .ring:nth-child(2) {
            width: 480px; height: 480px;
            border-left: 3px solid #800000;
            animation-direction: reverse; animation-duration: 6s; opacity: 0.5;
        }

        @keyframes rotateRing {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        /* LOGIN FORM BOX */
        .login-box {
            position: relative; z-index: 20; width: 320px; padding: 40px;
            background: rgba(15, 15, 15, 0.75); backdrop-filter: blur(15px);
            border-radius: 40px; border: 1px solid rgba(255, 255, 255, 0.1);
            text-align: center; box-shadow: 0 25px 50px rgba(0,0,0,0.5);
        }

        .login-header {
            font-size: 32px; font-weight: 800; margin-bottom: 35px;
            letter-spacing: 2px; color: #ff1e1e;
            text-shadow: 0 0 10px rgba(255, 30, 30, 0.5);
        }

        /* INPUTS */
        .input-wrapper { position: relative; margin-bottom: 25px; }

        input {
            width: 100%; padding: 16px 20px;
            background: rgba(255, 255, 255, 0.03);
            border: 1.5px solid rgba(255, 255, 255, 0.1);
            border-radius: 15px; color: white; font-size: 15px;
            outline: none; box-sizing: border-box; transition: 0.4s;
        }

        .label-tag {
            position: absolute; left: 15px; top: -10px;
            background: #050505; padding: 0 10px;
            font-size: 12px; color: #ff1e1e; font-weight: bold; border-radius: 5px;
        }

        input:focus {
            border-color: #ff1e1e;
            background: rgba(255, 30, 30, 0.05);
            box-shadow: 0 0 20px rgba(255, 30, 30, 0.2);
        }

        .btn-login {
            width: 100%; padding: 16px; border-radius: 15px; border: none;
            background: linear-gradient(45deg, #ff1e1e, #800000);
            color: white; font-weight: 700; font-size: 16px;
            cursor: pointer; transition: 0.4s ease;
            box-shadow: 0 10px 20px rgba(255, 30, 30, 0.3);
        }

        .btn-login:hover { transform: scale(1.02); filter: brightness(1.2); }

        /* RESPONSIVE */
        @media (max-width: 550px) {
            .main-container { transform: scale(0.65); }
        }
    </style>
</head>
<body>

    <div id="intro">
        <div class="title" id="animatedText"></div>
        <div class="dev">Developed by </div>
    </div>

    <div id="loginPage">
        <div class="main-container">
            <div class="ring"></div>
            <div class="ring"></div>

            <div class="login-box">
                <h1 class="login-header">Login</h1>

                <form method="POST">
                    {% csrf_token %}

                    <div class="input-wrapper">
                        <input type="text" name="username" placeholder="Username" required>
                    </div>

                    <div class="input-wrapper">
                        <span class="label-tag">PASSWORD</span>
                        <input type="password" name="password" style="border-color: #ff1e1e;" required>
                    </div>

                    <button type="submit" class="btn-login">Log In</button>


                </form>
            </div>
        </div>
    </div>

    <script>
        /* INTRO TEXT LOGIC */
        const text = "TRUEAPPS";
        const container = document.getElementById("animatedText");

        text.split("").forEach((char, i) => {
            const span = document.createElement("span");
            span.textContent = char;
            span.classList.add("letter");
            span.style.color = i < 4 ? "#fff" : "#ff1e1e";
            span.style.animationDelay = (i * 0.15) + "s";
            container.appendChild(span);
        });

        /* TRANSITION TO LOGIN */
        window.addEventListener('load', () => {
            setTimeout(() => {
                const intro = document.getElementById("intro");
                const loginPage = document.getElementById("loginPage");

                if(intro) intro.style.opacity = "0";
                setTimeout(() => {
                    if(intro) intro.style.display = "none";
                    if(loginPage) loginPage.style.opacity = "1";
                }, 800);
            }, 3000);
        });
    </script>
</body>
</html>
