{% extends 'base.html' %}
{% block content %}

<div class="container mt-4">

    <!-- Back Button -->
    <div class="mb-3">
        <a href="{% url 'sales_list' %}" class="btn btn-secondary btn-sm shadow-sm">
            <i class="fa fa-arrow-left"></i> Back
        </a>
    </div>

    <div class="row justify-content-center">

        <div class="col-lg-5 col-md-6 col-12">

            <div class="card shadow-sm border-0">

                <div class="card-header bg-dark text-white">
                    <h5 class="mb-0">Invoice Prefix Settings</h5>
                </div>

                <div class="card-body p-4">

                    <form method="POST">

                        {% csrf_token %}

                        <div class="mb-3">

                            <label class="form-label fw-bold">
                                Set Prefix
                            </label>

                            <input
                                type="text"
                                name="prefix"
                                class="form-control text-uppercase fw-bold"
                                value="{{ setting.prefix }}"
                                required
                            >

                            <small class="text-muted d-block mt-2">
                                Example: TBT, INV, SALES etc.
                            </small>

                        </div>

                        <div class="d-grid d-md-flex gap-2">

                            <button type="submit" class="btn btn-success">
                                Save Settings
                            </button>

                            <a href="{% url 'sales_list' %}" class="btn btn-light">
                                Back to List
                            </a>

                        </div>

                    </form>

                </div>

            </div>

        </div>

    </div>

</div>

{% endblock %}
