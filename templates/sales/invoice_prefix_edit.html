{% extends 'base.html' %}
{% block content %}

<div class="container mt-4">

    <!-- Back Button -->
    <div class="mb-3">
        <a href="{% url 'sales_list' %}" class="btn btn-secondary btn-sm">
            ← Back
        </a>
    </div>

    <div class="card shadow-sm" style="max-width:500px; margin:auto;">
        <div class="card-body">

            <h4 class="mb-4">Edit Invoice Prefix</h4>

            <form method="post">
                {% csrf_token %}

                <div class="mb-3">
                    <label class="form-label">Invoice Prefix</label>

                    <input
                        type="text"
                        name="prefix"
                        value="{{ setting.prefix }}"
                        class="form-control"
                        required
                    >
                </div>

                <div class="d-flex gap-2">

                    <button class="btn btn-primary">
                        Save
                    </button>

                    <a href="{% url 'sales_list' %}" class="btn btn-secondary">
                        Cancel
                    </a>

                </div>

            </form>

        </div>
    </div>

</div>

{% endblock %}
