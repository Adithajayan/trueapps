<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">

<style>
@page {
    size: A4;
    margin: 18mm;
}

body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica;
    background: #f4f7fb;
    margin: 0;
    padding: 0;
    color: #0f172a;
}

/* WRAPPER */
.wrapper {
    max-width: 420px;
    margin: auto;
    background: #ffffff;
    border-radius: 22px;
    padding: 26px;
    box-shadow: 0 18px 40px rgba(15, 23, 42, 0.15);
}

/* ===== HEADER ===== */
.header {
    text-align: center;
    margin-bottom: 22px;
}

.header h2 {
    margin: 0;
    font-size: 22px;
    font-weight: 700;
    letter-spacing: .4px;
}

.sub {
    font-size: 13px;
    color: #64748b;
    margin-top: 6px;
}

/* ===== TOTAL CARD ===== */
.total-box {
    background: linear-gradient(135deg, #6366f1, #8b5cf6);
    border-radius: 18px;
    padding: 22px;
    text-align: center;
    color: #ffffff;
    margin: 24px 0;
}

.total-box span {
    font-size: 12px;
    opacity: .85;
    letter-spacing: 1px;
}

.total-box h1 {
    margin: 8px 0 0;
    font-size: 34px;
}

/* ===== SECTION TITLE ===== */
.section-title {
    font-size: 15px;
    font-weight: 600;
    margin-bottom: 14px;
}

/* ===== RANKED CARDS ===== */
.card {
    background: #f8fafc;
    border-radius: 16px;
    padding: 14px 16px;
    margin-bottom: 14px;
    border-left: 6px solid;
}

.card-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    flex-wrap: wrap;
    gap: 6px;
}

.badge {
    font-size: 12px;
    padding: 4px 10px;
    border-radius: 12px;
    font-weight: 600;
    color: #ffffff;
}

.amount {
    font-weight: 700;
}

.progress {
    background: #e5e7eb;
    height: 7px;
    border-radius: 10px;
    margin-top: 10px;
}

.progress-fill {
    height: 7px;
    border-radius: 10px;
}

/* ===== FOOTER ===== */
.footer {
    text-align: center;
    font-size: 11px;
    color: #94a3b8;
    margin-top: 26px;
}

/* ===== MOBILE SAFE RESPONSIVE (WEB PREVIEW) ===== */
@media(max-width:480px){

    .wrapper{
        max-width:100%;
        border-radius:0;
        padding:20px;
    }

    .total-box h1{
        font-size:28px;
    }

    .card-header{
        flex-direction:column;
        align-items:flex-start;
    }

}

</style>
</head>

<body>
<div class="wrapper">

    <!-- HEADER -->
    <div class="header">
        <h2>Expense Summary</h2>
        <div class="sub">
            {{ selected_type }} <br>
            {{ from_date }} – {{ to_date }}
        </div>
    </div>

    <!-- TOTAL -->
    <div class="total-box">
        <span>TOTAL EXPENSE</span>
        <h1>₹ {{ total_amount }}</h1>
    </div>

    <!-- CATEGORY LIST -->
    <div class="section-title">Top Expenses</div>

    {% for c in category_summary %}
    <div class="card"
         style="border-left-color:
         {% cycle '#6366f1' '#22c55e' '#f59e0b' '#ef4444' '#0ea5e9' '#a855f7' %};">

        <div class="card-header">
            <div>
                <strong>{{ c.category }}</strong>
                <span class="badge"
                      style="background:
                      {% cycle '#6366f1' '#22c55e' '#f59e0b' '#ef4444' '#0ea5e9' '#a855f7' %};">
                    {{ c.percentage }}%
                </span>
            </div>

            <div class="amount">
                ₹ {{ c.total }}
            </div>
        </div>

        <div class="progress">
            <div class="progress-fill"
                 style="width: {{ c.percentage }}%;
                        background:
                        {% cycle '#6366f1' '#22c55e' '#f59e0b' '#ef4444' '#0ea5e9' '#a855f7' %};">
            </div>
        </div>
    </div>
    {% endfor %}

    <div class="footer">
        Generated by TRUEAPPS
    </div>

</div>
</body>
</html>
