{% extends 'base.html' %}
{% block content %}

<style>

/* ===== BACK BUTTON ===== */
.back-btn{
    display:inline-flex;
    align-items:center;
    gap:6px;
    background:linear-gradient(135deg,#111827,#374151);
    color:white;
    padding:7px 16px;
    border-radius:30px;
    text-decoration:none;
    font-size:14px;
    font-weight:600;
    margin-bottom:15px;
    transition:.3s;
}

.back-btn:hover{
    transform:translateY(-2px);
    box-shadow:0 6px 14px rgba(0,0,0,0.25);
    color:white;
}

/* FORM CARD */
.form-card{
    max-width:500px;
    margin:auto;
    background:#ffffff;
    padding:24px;
    border-radius:16px;
    box-shadow:0 10px 25px rgba(0,0,0,0.08);
}

/* MOBILE */
@media(max-width:768px){

    .form-card{
        padding:18px;
    }

    .form-card h4{
        font-size:18px;
    }

    .form-card .btn{
        font-size:13px;
        padding:7px 12px;
    }

}

</style>

<div class="container mt-4">

    <!-- BACK BUTTON -->
    <a href="{% url 'expense_home' %}" class="back-btn">
        ← Back
    </a>

    <div class="form-card">

        <h4 class="mb-3">{{ title }}</h4>

        <form method="post">
            {% csrf_token %}

            <div class="mb-3">
                <label class="form-label">Expense Type Name</label>

                <input type="text"
                       name="name"
                       class="form-control"
                       required
                       value="{{ expense_type.name|default:'' }}">
            </div>

            <div class="d-flex gap-2">

                <button class="btn btn-success">
                    Save
                </button>

                <a href="{% url 'expense_home' %}"
                   class="btn btn-secondary">
                   Cancel
                </a>

            </div>

        </form>

    </div>

</div>

{% endblock %}
