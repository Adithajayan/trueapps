{% extends 'base.html' %}
{% block content %}

<style>

/* ===== BACK BUTTON ===== */
.back-btn{
    display:inline-flex;
    align-items:center;
    gap:6px;
    background:linear-gradient(135deg,#111827,#374151);
    color:white;
    padding:7px 16px;
    border-radius:30px;
    text-decoration:none;
    font-size:14px;
    font-weight:600;
    margin-bottom:15px;
    transition:.3s;
}

.back-btn:hover{
    transform:translateY(-2px);
    box-shadow:0 6px 14px rgba(0,0,0,0.25);
    color:white;
}

/* PARTNER CARD */
.partner-card{
    border-radius:14px;
    transition:0.3s;
}

.partner-card:hover{
    transform:translateY(-4px);
    box-shadow:0 12px 30px rgba(0,0,0,0.12);
}

/* MOBILE */
@media(max-width:768px){

    h4{
        font-size:20px;
    }

    .partner-card .btn{
        font-size:12px;
        padding:5px 8px;
    }

}

</style>

<div class="container mt-4">

    <!-- BACK BUTTON -->
    <a href="{% url 'expense_home' %}" class="back-btn">
        ← Back
    </a>

    <div class="d-flex justify-content-between align-items-center flex-wrap gap-2 mb-3">

        <h4>
            <i class="fa fa-users"></i> Partners
        </h4>

        <a href="{% url 'partner_add' %}" class="btn btn-success">
            + Add Partner
        </a>

    </div>

    <div class="row">

        {% for p in partners %}
        <div class="col-lg-3 col-md-4 col-sm-6 col-6 mb-3">

            <div class="card shadow-sm text-center partner-card">

                <div class="card-body">

                    <h5>{{ p.name }}</h5>

                    <div class="mt-3 d-flex justify-content-center gap-2 flex-wrap">

                        <a href="{% url 'partner_edit' p.id %}"
                           class="btn btn-sm btn-warning">
                            Edit
                        </a>

                        <button class="btn btn-sm btn-danger"
                                data-bs-toggle="modal"
                                data-bs-target="#deleteModal"
                                data-id="{{ p.id }}"
                                data-name="{{ p.name }}">
                            Delete
                        </button>

                    </div>

                </div>

            </div>

        </div>

        {% empty %}

        <div class="col-12">
            <div class="alert alert-info text-center">
                No partners found.
            </div>
        </div>

        {% endfor %}

    </div>

</div>

<!-- DELETE MODAL -->
<div class="modal fade" id="deleteModal" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content">

            <div class="modal-header">
                <h5 class="modal-title">Delete Partner</h5>
                <button class="btn-close" data-bs-dismiss="modal"></button>
            </div>

            <div class="modal-body">
                Delete <b id="deleteName"></b> ?
            </div>

            <div class="modal-footer">
                <button class="btn btn-secondary"
                        data-bs-dismiss="modal">
                    Cancel
                </button>

                <a href="#" id="confirmDeleteBtn"
                   class="btn btn-danger">
                    Delete
                </a>
            </div>

        </div>
    </div>
</div>

<script>
const deleteModal = document.getElementById('deleteModal');

deleteModal.addEventListener('show.bs.modal', function (event) {

    const button = event.relatedTarget;
    const id = button.getAttribute('data-id');
    const name = button.getAttribute('data-name');

    document.getElementById('deleteName').innerText = name;

    document.getElementById('confirmDeleteBtn').href =
        `/expense/partners/delete/${id}/`;

});
</script>

{% endblock %}
