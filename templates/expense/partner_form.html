{% extends 'base.html' %}
{% block content %}

<style>

/* ===== BACK BUTTON ===== */
.back-btn{
    display:inline-flex;
    align-items:center;
    gap:6px;
    background:linear-gradient(135deg,#111827,#374151);
    color:white;
    padding:7px 16px;
    border-radius:30px;
    text-decoration:none;
    font-size:14px;
    font-weight:600;
    margin-bottom:15px;
    transition:.3s;
}

.back-btn:hover{
    transform:translateY(-2px);
    box-shadow:0 6px 14px rgba(0,0,0,0.25);
    color:white;
}

/* FORM CARD */
.form-card{
    max-width:500px;
    margin:auto;
    background:#ffffff;
    border-radius:14px;
    box-shadow:0 12px 30px rgba(0,0,0,0.08);
}

/* MOBILE */
@media(max-width:768px){

    .form-card{
        margin-top:10px;
    }

    .form-card .btn{
        font-size:13px;
        padding:7px 12px;
    }

}

</style>

<div class="container mt-5" style="max-width:500px;">

    <!-- BACK BUTTON -->
    <a href="{% url 'partner_list' %}" class="back-btn">
        ← Back
    </a>

    <div class="card shadow form-card">
        <div class="card-body">

            <h5 class="mb-3">{{ title }}</h5>

            <form method="post">
                {% csrf_token %}

                <div class="mb-3">
                    <label class="form-label">Partner Name</label>

                    <input type="text"
                           name="name"
                           class="form-control"
                           required
                           value="{{ partner.name|default:'' }}">
                </div>

                <div class="d-flex justify-content-between gap-2">

                    <a href="{% url 'partner_list' %}"
                       class="btn btn-secondary">
                        Cancel
                    </a>

                    <button class="btn btn-success">
                        Save
                    </button>

                </div>

            </form>

        </div>
    </div>

</div>

{% endblock %}
