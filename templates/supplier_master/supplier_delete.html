{% extends 'base.html' %}
{% block content %}

<div class="card p-4 shadow rounded-4 text-center">

    <h5 class="mb-3 text-danger">
        Delete Supplier?
    </h5>

    <p>
        Are you sure you want to delete<br>
        <b>{{ supplier.name }}</b> ?
    </p>

    <form method="post">
        {% csrf_token %}
        <button class="btn btn-danger px-4">Yes Delete</button>
        <a href="{% url 'supplier_master_list' %}"
           class="btn btn-secondary px-4">
            Cancel
        </a>
    </form>

</div>

{% endblock %}
