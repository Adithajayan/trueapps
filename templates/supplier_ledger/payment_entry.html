{% extends 'base.html' %}
{% block content %}

<style>
    .payment-card {
        border-radius: 20px;
        border: none;
    }
    .form-label {
        font-weight: 600;
        color: #555;
    }
    .form-control, .form-select {
        border-radius: 10px;
        padding: 10px 15px;
    }
</style>

<div class="container py-4">
    <div class="card shadow-lg p-4 payment-card">

        <div class="d-flex align-items-center mb-4">
            <h4 class="fw-bold m-0">💸 Supplier Payment Entry</h4>
        </div>

        <form method="POST">
            {% csrf_token %}

            <div class="row g-4">

                <div class="col-md-4">
                    <label class="form-label">Select Supplier</label>
                    <select name="supplier" class="form-select shadow-sm" required>
                        <option value="" selected disabled>Choose a supplier...</option>
                        {% for s in suppliers %}
                        <option value="{{ s.id }}">{{ s.name }}</option>
                        {% endfor %}
                    </select>
                </div>

                <div class="col-md-4">
                    <label class="form-label">Payment Date</label>
                    <input type="date" name="date" class="form-control shadow-sm" value="{% now 'Y-m-d' %}" required>
                </div>

                <div class="col-md-4">
                    <label class="form-label">Payment Mode</label>
                    <select name="mode" class="form-select shadow-sm" required>
                        <option value="CASH">💵 CASH</option>
                        <option value="UPI">📱 UPI (G-Pay/PhonePe)</option>
                        <option value="BANK">🏦 BANK TRANSFER</option>
                    </select>
                </div>

                <div class="col-md-6">
                    <label class="form-label text-success">Amount to Pay (₹)</label>
                    <div class="input-group shadow-sm">
                        <span class="input-group-text bg-success text-white border-0">₹</span>
                        <input type="number" step="0.01" name="amount" class="form-control fw-bold border-success" placeholder="0.00" required>
                    </div>
                </div>

                <div class="col-md-6">
                    <label class="form-label">Remark / Transaction ID</label>
                    <input type="text" name="remark" class="form-control shadow-sm" placeholder="e.g. UPI Ref No or Invoice details">
                </div>

            </div>

            <div class="mt-5">
                <button type="submit" class="btn btn-success px-5 py-2 rounded-pill fw-bold shadow">
                    ✅ Save Payment
                </button>
                <a href="{% url 'supplier_ledger_summary' %}" class="btn btn-outline-secondary px-4 py-2 rounded-pill ms-2">
                    Cancel
                </a>
            </div>

        </form>
    </div>
</div>

{% endblock %}
