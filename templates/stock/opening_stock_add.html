{% extends 'base.html' %}
{% block content %}

<link href="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/css/select2.min.css" rel="stylesheet" />
<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/js/select2.min.js"></script>

<style>
/* Mobile improvements */
@media (max-width:768px){

    h4{
        font-size:18px;
    }

}
</style>

<div class="container-fluid px-2 px-md-3">

<div class="card shadow p-4 rounded-4 col-md-6 mx-auto">

    <div class="d-flex flex-column flex-md-row justify-content-between align-items-md-center gap-3 mb-3">

        <h4 class="fw-bold mb-0">➕ Opening Stock</h4>

        <!-- Back Button -->
        <a href="{% url 'stock_list' %}" class="btn btn-outline-secondary rounded-pill px-3">
            ← Back
        </a>

    </div>

    <form method="post">
        {% csrf_token %}

        <div class="mb-3">
            <label class="fw-bold">Product</label>

            <select name="product" id="product_search" class="form-select" required>

                <option value="">Search and select product</option>

                {% for p in products %}

                    <option value="{{ p.id }}">{{ p.name }}</option>

                {% endfor %}

            </select>
        </div>

        <div class="row">

            <div class="col-6 col-md-6 mb-3">

                <label class="fw-bold">Quantity</label>

                <input type="number"
                       step="0.01"
                       name="quantity"
                       class="form-control"
                       required>

            </div>

            <div class="col-6 col-md-6 mb-3">

                <label class="fw-bold">Selling Rate</label>

                <input type="number"
                       step="0.01"
                       name="selling_rate"
                       class="form-control"
                       placeholder="0.00">

            </div>

        </div>

        <div class="row">

            <div class="col-6 col-md-6 mb-3">

                <label class="fw-bold">CGST %</label>

                <input type="number"
                       step="0.01"
                       name="cgst"
                       class="form-control"
                       placeholder="0">

            </div>

            <div class="col-6 col-md-6 mb-3">

                <label class="fw-bold">SGST %</label>

                <input type="number"
                       step="0.01"
                       name="sgst"
                       class="form-control"
                       placeholder="0">

            </div>

        </div>

        <button class="btn btn-success w-100 mt-2">
            Save Opening Stock
        </button>

    </form>

</div>

</div>

<script>
    $(document).ready(function() {
        $('#product_search').select2({
            placeholder: "Type product name...",
            width: '100%'
        });
    });
</script>

{% endblock %}
