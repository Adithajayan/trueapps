{% extends 'base.html' %}
{% block content %}

<div class="container-fluid px-2 px-md-3 mt-3">

<div class="card shadow p-4 rounded-4">

    <div class="d-flex flex-column flex-md-row justify-content-between align-items-md-center gap-3 mb-3">

        <h4 class="fw-bold m-0">📘 Opening Stock History</h4>

        <div class="d-flex flex-wrap gap-2">

            <!-- Back Button -->
            <a href="{% url 'stock_list' %}" class="btn btn-outline-secondary rounded-pill px-3">
                ← Back
            </a>

            <a href="{% url 'opening_stock_add' %}" class="btn btn-primary">
                + Add Opening Stock
            </a>

        </div>

    </div>

    <div class="table-responsive">

        <table class="table table-bordered text-center align-middle">

            <thead class="table-light">

                <tr>
                    <th>Date</th>
                    <th>Product</th>
                    <th>Qty</th>
                    <th>Action</th>
                </tr>

            </thead>

            <tbody>

            {% for h in histories %}

                <tr>

                    <td>
                        {{ h.created_at|date:"d M Y" }}
                    </td>

                    <td>
                        {{ h.product.name }}
                    </td>

                    <td class="fw-bold">
                        {{ h.qty }}
                    </td>

                    <td>

                        <div class="d-flex justify-content-center flex-wrap gap-1">

                            <a href="{% url 'opening_stock_edit' h.id %}"
                               class="btn btn-sm btn-outline-primary">

                               Edit

                            </a>

                            <a href="{% url 'opening_stock_delete' h.id %}"
                               class="btn btn-sm btn-outline-danger">

                               Delete

                            </a>

                        </div>

                    </td>

                </tr>

            {% empty %}

                <tr>

                    <td colspan="4">
                        No opening stock added
                    </td>

                </tr>

            {% endfor %}

            </tbody>

        </table>

    </div>

</div>

</div>

{% endblock %}
