{% extends 'base.html' %}
{% block content %}

<link href="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/css/select2.min.css" rel="stylesheet" />
<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/js/select2.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

<style>

    /* Select2 UI fixes */
    .select2-container .select2-selection--single {
        height: 38px !important;
        border: 1px solid #dee2e6 !important;
        border-radius: 8px;
    }

    .select2-container--default .select2-selection--single .select2-selection__rendered {
        line-height: 36px !important;
    }

    .select2-container--default .select2-selection--single .select2-selection__arrow {
        height: 36px !important;
    }

    /* Table inputs neat aavan */
    .table input {
        min-width: 80px;
    }

    .total-column {
        font-weight: bold;
        background-color: #f8f9fa;
    }

    /* Remove button hover effect */
    .btn-outline-danger:hover {
        background-color: #dc3545;
        color: white;
    }

    /* Mobile improvements */
    @media (max-width:768px){

        h4{
            font-size:18px;
        }

        .card{
            padding:16px !important;
        }

        .table th,
        .table td{
            font-size:14px;
        }

    }

</style>


<div class="container-fluid px-2 px-md-3">

    <div class="card shadow p-3 p-md-4 rounded-4 border-0">

        <!-- Header -->
        <div class="d-flex flex-column flex-md-row justify-content-between align-items-md-center gap-3 mb-4">

            <h4 class="mb-0 fw-bold text-dark">
                🧾 Purchase Entry
            </h4>

            <!-- Back Button -->
            <a href="{% url 'purchase_list' %}" class="btn btn-outline-secondary btn-sm px-4 rounded-pill shadow-sm">
                ← Back to List
            </a>

        </div>

        <form method="POST" {% if purchase %}action="{% url 'purchase_edit' purchase.id %}"{% endif %}>
            {% csrf_token %}

            <div class="row g-3 mb-4">

                <div class="col-12 col-md-3">
                    <label class="fw-semibold mb-1">Supplier</label>

                    <select name="supplier" class="form-control searchable-select" required>

                        <option value="">Select Supplier</option>

                        {% for s in suppliers %}
                            <option value="{{ s.id }}" {% if purchase and purchase.supplier.id == s.id %}selected{% endif %}>
                                {{ s.name }}
                            </option>
                        {% endfor %}

                    </select>
                </div>

                <div class="col-6 col-md-3">

                    <label class="fw-semibold mb-1">Purchase Date</label>

                    <input type="date"
                           name="purchase_date"
                           value="{{ purchase.purchase_date|date:'Y-m-d' }}"
                           class="form-control"
                           required>

                </div>

                <div class="col-6 col-md-3">

                    <label class="fw-semibold mb-1">Purchase Type</label>

                    <select name="payment_type" class="form-control" required>

                        <option value="CREDIT" {% if purchase.payment_type == "CREDIT" %}selected{% endif %}>
                            Credit Purchase
                        </option>

                        <option value="CASH" {% if purchase.payment_type == "CASH" %}selected{% endif %}>
                            Cash Purchase
                        </option>

                        <option value="UPI" {% if purchase.payment_type == "UPI" %}selected{% endif %}>
                            UPI Purchase
                        </option>

                        <option value="BANK" {% if purchase.payment_type == "BANK" %}selected{% endif %}>
                            Bank Transfer
                        </option>

                    </select>
                </div>

                <div class="col-6 col-md-3">

                    <label class="fw-semibold mb-1">Tax Type</label>

                    <select name="tax_type" class="form-control">

                        <option value="EXCLUSIVE" {% if purchase and purchase.tax_type == "EXCLUSIVE" %}selected{% endif %}>
                            Exclusive
                        </option>

                        <option value="INCLUSIVE" {% if purchase and purchase.tax_type == "INCLUSIVE" %}selected{% endif %}>
                            Inclusive
                        </option>

                    </select>
                </div>

            </div>


            <div class="table-responsive">

                <table class="table table-hover table-bordered text-center align-middle" id="purchaseTable">

                    <thead class="table-dark">

                        <tr>
                            <th style="min-width: 250px;">Product</th>
                            <th width="100">Qty</th>
                            <th width="130">Rate</th>
                            <th width="130">Selling Rate</th>
                            <th width="90">CGST %</th>
                            <th width="90">SGST %</th>
                            <th width="130">Total</th>
                            <th width="50"></th>
                        </tr>

                    </thead>


                    <tbody>

                    {% if items %}

                        {% for i in items %}

                        <tr>

                            <td>
                                <select name="product[]" class="form-control searchable-select">

                                    {% for p in products %}
                                        <option value="{{ p.id }}" {% if p.id == i.product.id %}selected{% endif %}>
                                            {{ p.name }}
                                        </option>
                                    {% endfor %}

                                </select>
                            </td>

                            <td>
                                <input type="number"
                                       name="qty[]"
                                       value="{{ i.qty }}"
                                       step="any"
                                       class="form-control qty"
                                       required>
                            </td>

                            <td>
                                <input type="number"
                                       name="rate[]"
                                       value="{{ i.rate }}"
                                       step="any"
                                       class="form-control rate"
                                       required>
                            </td>

                            <td>
                                <input type="number"
                                       name="selling_rate[]"
                                       value="{{ i.selling_rate }}"
                                       step="any"
                                       class="form-control"
                                       placeholder="MRP">
                            </td>

                            <td>
                                <input type="number"
                                       name="cgst[]"
                                       value="{{ i.cgst }}"
                                       step="any"
                                       class="form-control cgst">
                            </td>

                            <td>
                                <input type="number"
                                       name="sgst[]"
                                       value="{{ i.sgst }}"
                                       step="any"
                                       class="form-control sgst">
                            </td>

                            <td class="total-column">
                                <span class="total">{{ i.total }}</span>
                            </td>

                            <td>
                                <button type="button" class="btn btn-outline-danger btn-sm remove">×</button>
                            </td>

                        </tr>

                        {% endfor %}

                    {% else %}

                        <tr>

                            <td>

                                <select name="product[]" class="form-control searchable-select">

                                    <option value="">Select Product</option>

                                    {% for p in products %}
                                        <option value="{{ p.id }}">{{ p.name }}</option>
                                    {% endfor %}

                                </select>

                            </td>

                            <td>
                                <input type="number" name="qty[]" value="1" step="any" class="form-control qty" required>
                            </td>

                            <td>
                                <input type="number" name="rate[]" step="any" class="form-control rate" required placeholder="0.00">
                            </td>

                            <td>
                                <input type="number" name="selling_rate[]" step="any" class="form-control" placeholder="MRP">
                            </td>

                            <td>
                                <input type="number" name="cgst[]" value="0" step="any" class="form-control cgst">
                            </td>

                            <td>
                                <input type="number" name="sgst[]" value="0" step="any" class="form-control sgst">
                            </td>

                            <td class="total-column">
                                <span class="total">0.00</span>
                            </td>

                            <td>
                                <button type="button" class="btn btn-outline-danger btn-sm remove">×</button>
                            </td>

                        </tr>

                    {% endif %}

                    </tbody>

                </table>

            </div>


            <div class="row align-items-center mt-3">

                <div class="col-md-6 mb-2 mb-md-0">

                    <button type="button"
                            class="btn btn-primary btn-sm rounded-pill px-4"
                            onclick="addRow()">

                        ➕ Add New Row

                    </button>

                </div>

                <div class="col-md-6 text-md-end">

                    <div class="card d-inline-block p-2 px-4 bg-light border-0 shadow-sm">

                        <h5 class="mb-0 fw-bold text-primary">
                            Grand Total: ₹
                            <span id="grandTotal">0.00</span>
                        </h5>

                    </div>

                </div>

            </div>


            <div class="mt-5 mb-3 text-center text-md-start">

                <button type="submit"
                        class="btn btn-success px-5 py-2 rounded-pill shadow-sm fw-bold">

                    💾 Save Purchase Entry

                </button>

            </div>

        </form>

    </div>

</div>


<script>

// Select2 Initialization
function applySelect2() {

    $('.searchable-select').each(function() {

        $(this).select2({
            placeholder: "Search ...",
            allowClear: true,
            width: '100%',
            dropdownParent: $(this).parent()
        });

    });

}

$(document).ready(function() {

    applySelect2();
    calculateGrandTotal();

});


// Add Row Logic
function addRow() {

    $('.searchable-select').select2('destroy');

    let tbody = document.querySelector("#purchaseTable tbody");
    let rows = tbody.querySelectorAll("tr");
    let lastRow = rows[rows.length - 1];

    let newRow = lastRow.cloneNode(true);

    newRow.querySelectorAll("input").forEach(i => {

        if(i.classList.contains('qty')) i.value = "1";
        else if(i.classList.contains('cgst') || i.classList.contains('sgst')) i.value = "0";
        else i.value = "";

    });

    newRow.querySelector(".total").innerText = "0.00";

    tbody.appendChild(newRow);

    applySelect2();

}


// Calculation Logic
function calculateGrandTotal() {

    let grand = 0;

    document.querySelectorAll("#purchaseTable tbody tr").forEach(row => {

        let qty = parseFloat(row.querySelector(".qty")?.value || 0);
        let rate = parseFloat(row.querySelector(".rate")?.value || 0);
        let cgst = parseFloat(row.querySelector(".cgst")?.value || 0);
        let sgst = parseFloat(row.querySelector(".sgst")?.value || 0);

        let base = qty * rate;

        let gstAmount = base * (cgst + sgst) / 100;

        let total = base + gstAmount;

        row.querySelector(".total").innerText = total.toFixed(2);

        grand += total;

    });

    document.getElementById("grandTotal").innerText =
        grand.toLocaleString('en-IN', {minimumFractionDigits: 2});

}


// Event Listeners for Calculation
document.addEventListener("input", function (e) {

    if (e.target.matches(".qty, .rate, .cgst, .sgst")) {

        calculateGrandTotal();

    }

});


// Remove Row Logic
document.addEventListener("click", function (e) {

    if (e.currentTarget.activeElement.classList.contains("remove")) {

        let btn = e.currentTarget.activeElement;

        let rows = document.querySelectorAll("#purchaseTable tbody tr");

        if (rows.length > 1) {

            btn.closest("tr").remove();

            calculateGrandTotal();

        } else {

            Swal.fire({
                icon: 'warning',
                title: 'Opps...',
                text: 'At least one row is required for purchase!',
                confirmButtonColor: '#3085d6',
            });

        }

    }

});

</script>

{% endblock %}
