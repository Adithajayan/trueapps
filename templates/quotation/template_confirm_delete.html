{% extends 'base.html' %}
{% block content %}

<!-- BACK BUTTON -->
<div class="mb-3">
    <a href="{% url 'template_list' %}" class="btn btn-outline-secondary btn-sm">
        ← Back
    </a>
</div>

<div class="container mt-4">
    <div class="row justify-content-center">

        <div class="col-12 col-md-6 col-lg-5">

            <div class="card shadow-lg border-0">
                <div class="card-body text-center p-4 p-md-5">

                    <div class="text-danger mb-4">
                        <i class="fas fa-exclamation-triangle fa-4x"></i>
                    </div>

                    <h3 class="fw-bold mb-3">Confirm Delete</h3>

                    <p class="text-muted mb-4">
                        Sathyamayum ningalkku <strong>"{{ template.name }}"</strong> enna template delete cheyyano?<br>
                        <span class="small text-danger">
                            Ithu delete cheythal thirichu kittilla!
                        </span>
                    </p>

                    <form method="post">
                        {% csrf_token %}

                        <div class="d-grid gap-2">

                            <button type="submit"
                                    class="btn btn-danger btn-lg shadow-sm">
                                Yes, Delete It
                            </button>

                            <a href="{% url 'template_list' %}"
                               class="btn btn-light btn-lg border">
                               Cancel
                            </a>

                        </div>

                    </form>

                </div>
            </div>

        </div>

    </div>
</div>

{% endblock %}
