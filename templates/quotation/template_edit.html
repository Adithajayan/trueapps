{% extends 'base.html' %}
{% block content %}

<!-- BACK BUTTON -->
<div class="mb-3">
    <a href="{% url 'template_list' %}" class="btn btn-outline-secondary btn-sm">
        ← Back
    </a>
</div>

<h4 class="mb-3">✏️ Edit Template</h4>

<form method="post" class="card p-3 p-md-4 shadow-sm">
    {% csrf_token %}

    <div class="mb-3 col-12 col-md-4">
        <label class="fw-bold">Template Name</label>
        <input name="name" class="form-control" value="{{ template.name }}" required>
    </div>

    <!-- RESPONSIVE TABLE -->
    <div class="table-responsive">
        <table class="table table-bordered" id="templateTable">

            <thead class="table-light">
                <tr>
                    <th>Product</th>
                    <th width="150">Default Qty</th>
                    <th width="50"></th>
                </tr>
            </thead>

            <tbody>

                {% for item in template.items.all %}
                <tr>
                    <td>
                        <select name="product[]" class="form-select product-select" required>
                            <option value="{{ item.product.id }}" selected>
                                {{ item.product.name }}
                            </option>
                        </select>
                    </td>

                    <td>
                        <input type="number"
                               name="qty[]"
                               value="{{ item.default_qty }}"
                               class="form-control">
                    </td>

                    <td>
                        <button type="button"
                                class="btn btn-danger btn-sm"
                                onclick="$(this).closest('tr').remove()">
                            ✖
                        </button>
                    </td>
                </tr>
                {% endfor %}

            </tbody>

        </table>
    </div>

    <button type="button"
            class="btn btn-primary btn-sm"
            onclick="addTemplateRow()">
        ➕ Add Product
    </button>

    <hr>

    <div class="d-flex flex-wrap gap-2">

        <button class="btn btn-success px-4">
            Save Changes
        </button>

        <a href="{% url 'template_list' %}" class="btn btn-secondary">
            Cancel
        </a>

    </div>

</form>

<script>
function addTemplateRow() {
    let row = `<tr>
        <td><select name="product[]" class="form-select product-select" required></select></td>
        <td><input type="number" name="qty[]" value="1" class="form-control"></td>
        <td><button type="button" class="btn btn-danger btn-sm" onclick="$(this).closest('tr').remove()">✖</button></td>
    </tr>`;
    let $row = $(row);
    $("#templateTable tbody").append($row);
    initSelect2($row.find('.product-select'));
}

function initSelect2(el) {
    $(el).select2({
        placeholder: "Select Product",
        ajax: {
            url: "{% url 'product_search' %}",
            dataType: 'json',
            data: function (params) { return { q: params.term }; },
            processResults: function (data) { return { results: data.results }; }
        }
    });
}

$(document).ready(function() {
    $('.product-select').each(function() { initSelect2(this); });
});
</script>

{% endblock %}
