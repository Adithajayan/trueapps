{% extends 'base.html' %}
{% block content %}

<!-- BACK BUTTON -->
<div class="mb-3">
    <a href="{% url 'quotation_add' %}" class="btn btn-outline-secondary btn-sm">
        ← Back
    </a>
</div>

<div class="d-flex flex-column flex-md-row justify-content-between align-items-md-center mb-4 gap-2">
    <h4 class="fw-bold text-dark mb-0">
        <i class="fas fa-file-invoice"></i> Quotation Templates
    </h4>

    <a href="{% url 'template_add' %}" class="btn btn-primary shadow-sm">
        <i class="fas fa-plus-circle"></i> Create New Template
    </a>
</div>

<div class="card shadow-sm border-0">
    <div class="card-body p-0">

        <div class="table-responsive">

            <table class="table table-hover align-middle mb-0">

                <thead class="table-dark">
                    <tr>
                        <th class="ps-4" style="width:60%;">Template Name</th>
                        <th class="text-center">Actions</th>
                    </tr>
                </thead>

                <tbody>

                    {% for t in templates %}
                    <tr>

                        <td class="ps-4">
                            <span class="fw-bold text-secondary text-uppercase">
                                {{ t.name }}
                            </span>
                        </td>

                        <td class="text-center">

                            <div class="d-flex flex-wrap justify-content-center gap-2">

                                <a href="{% url 'template_items' t.id %}"
                                   class="btn btn-sm btn-outline-primary px-3 fw-bold">
                                    <i class="fas fa-cog"></i> Items
                                </a>

                                <a href="{% url 'template_delete' t.id %}"
                                   class="btn btn-sm btn-outline-danger px-3 fw-bold">
                                    <i class="fas fa-trash"></i> Delete
                                </a>

                            </div>

                        </td>

                    </tr>

                    {% empty %}

                    <tr>
                        <td colspan="2"
                            class="text-center py-5 text-muted">

                            <i class="fas fa-folder-open fa-2x mb-3"></i>

                            <p class="mb-0">
                                Templates onnum add cheythittilla.
                            </p>

                        </td>
                    </tr>

                    {% endfor %}

                </tbody>

            </table>

        </div>

    </div>
</div>

<div class="mt-4">
    <a href="{% url 'quotation_add' %}"
       class="text-decoration-none text-muted small">

        <i class="fas fa-arrow-left"></i>
        Back to Create Quotation

    </a>
</div>

{% endblock %}
