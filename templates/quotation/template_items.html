{% extends 'base.html' %}
{% block content %}

<link href="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/css/select2.min.css" rel="stylesheet" />

<!-- BACK BUTTON -->
<div class="mb-3">
    <a href="{% url 'template_list' %}" class="btn btn-outline-secondary btn-sm">
        ← Back
    </a>
</div>

<div class="d-flex flex-column flex-md-row justify-content-between align-items-md-center mb-4 gap-2">
    <h4 class="fw-bold text-dark">
        ⚙️ Manage Items:
        <span class="text-primary">{{ template.name }}</span>
    </h4>

    <a href="{% url 'template_list' %}"
       class="btn btn-secondary btn-sm shadow-sm">
        📋 Back to Templates
    </a>
</div>

<div class="card shadow-sm border-0 mb-4 bg-light">
    <div class="card-body">

        <form method="post" class="row g-3 align-items-end">
            {% csrf_token %}

            <div class="col-12 col-md-7">
                <label class="form-label small fw-bold">Select Product</label>

                <select name="product"
                        id="productSelect"
                        class="form-select"
                        required>

                    <option value="">Search Product...</option>

                    {% for p in products %}
                        <option value="{{ p.id }}">
                            {{ p.name }}
                        </option>
                    {% endfor %}

                </select>
            </div>

            <div class="col-6 col-md-2">
                <label class="form-label small fw-bold">Qty</label>

                <input type="number"
                       name="qty"
                       class="form-control"
                       value="1"
                       step="0.01"
                       required>
            </div>

            <div class="col-6 col-md-3">
                <button type="submit"
                        class="btn btn-primary w-100 shadow-sm fw-bold">
                    Add Item
                </button>
            </div>

        </form>

    </div>
</div>

<div class="card shadow-sm border-0">

    <div class="table-responsive">

        <table class="table table-hover align-middle mb-0">

            <thead class="table-dark">
                <tr>
                    <th class="ps-3">Product Name</th>
                    <th width="200" class="text-center">Quantity</th>
                    <th width="150" class="text-center">Action</th>
                </tr>
            </thead>

            <tbody>

                {% for item in items %}
                <tr>

                    <td class="ps-3 fw-bold text-secondary">
                        {{ item.product.name }}
                    </td>

                    <td class="text-center">

                        <form action="{% url 'template_item_edit' item.id %}"
                              method="post"
                              class="input-group input-group-sm mx-auto"
                              style="max-width:150px;">

                            {% csrf_token %}

                            <input type="number"
                                   name="qty"
                                   value="{{ item.default_qty }}"
                                   class="form-control text-center fw-bold"
                                   step="0.01">

                            <button type="submit"
                                    class="btn btn-success px-2">
                                💾 Update
                            </button>

                        </form>

                    </td>

                    <td class="text-center">

                        <a href="{% url 'template_item_delete' item.id %}"
                           class="btn btn-sm btn-outline-danger shadow-sm px-3">
                           🗑️ Remove
                        </a>

                    </td>

                </tr>

                {% empty %}

                <tr>
                    <td colspan="3"
                        class="text-center py-5 text-muted">
                        No items in this template.
                    </td>
                </tr>

                {% endfor %}

            </tbody>

        </table>

    </div>

</div>

<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/js/select2.min.js"></script>

<script>
$(document).ready(function() {
    $('#productSelect').select2({
        width: '100%'
    });
});
</script>

{% endblock %}
