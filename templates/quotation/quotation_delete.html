{% extends 'base.html' %}
{% block content %}

<!-- BACK BUTTON -->
<div class="mb-3">
    <a href="{% url 'quotation_list' %}" class="btn btn-outline-secondary btn-sm">
        ← Back
    </a>
</div>

<div class="row justify-content-center">
    <div class="col-12 col-md-6 col-lg-4">

        <div class="card shadow">
            <div class="card-body text-center p-4">

                <h4 class="text-danger mb-3">
                    Delete Quotation
                </h4>

                <p>
                    Are you sure you want to delete quotation<br>
                    <b>QT-{{ quotation.id }}</b> ?
                </p>

                <form method="post" class="d-flex flex-column flex-sm-row justify-content-center gap-2 mt-3">
                    {% csrf_token %}

                    <button class="btn btn-danger px-4">
                        Yes, Delete
                    </button>

                    <a href="{% url 'quotation_list' %}" class="btn btn-secondary px-4">
                        Cancel
                    </a>

                </form>

            </div>
        </div>

    </div>
</div>

{% endblock %}
