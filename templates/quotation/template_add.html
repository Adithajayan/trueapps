{% extends 'base.html' %}
{% block content %}

<!-- BACK BUTTON -->
<div class="mb-3">
    <a href="{% url 'quotation_add' %}" class="btn btn-outline-secondary btn-sm">
        ← Back
    </a>
</div>

<div class="d-flex flex-column flex-md-row justify-content-between align-items-md-center mb-4 gap-2">
    <h3 class="mb-0">Add Quotation Template</h3>

    <a href="{% url 'template_list' %}" class="btn btn-secondary shadow-sm">
        📋 View All Templates
    </a>
</div>

<div class="row">
    <div class="col-12 col-md-6 col-lg-5">

        <div class="card shadow-sm">
            <div class="card-body">

                <form method="post">
                    {% csrf_token %}

                    <div class="mb-3">
                        <label class="fw-bold">Template Name</label>

                        <input type="text"
                               name="name"
                               class="form-control"
                               placeholder="camera set names"
                               required>
                    </div>

                    <div class="d-flex flex-wrap gap-2">

                        <button type="submit"
                                class="btn btn-success px-4">
                            Save Template
                        </button>

                        <a href="{% url 'quotation_add' %}"
                           class="btn btn-link text-muted">
                           Cancel
                        </a>

                    </div>

                </form>

            </div>
        </div>

    </div>
</div>

{% endblock %}
